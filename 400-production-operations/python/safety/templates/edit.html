<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit {{ book.title }} - Bookstore</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        h1 { color: #333; }
        textarea { width: 100%; height: 150px; font-family: inherit; font-size: 1rem; padding: 0.5rem; }
        button { background: #0066cc; color: white; border: none; padding: 0.75rem 1.5rem; font-size: 1rem; cursor: pointer; border-radius: 4px; margin-top: 0.5rem; }
        button:hover { background: #0052a3; }
        .flash { background: #fff3cd; border: 1px solid #ffc107; padding: 0.75rem; margin: 1rem 0; border-radius: 4px; }
        .back { display: inline-block; margin-top: 1rem; color: #0066cc; text-decoration: none; }
        .back:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>Edit: {{ book.title }}</h1>

    {% with messages = get_flashed_messages() %}
    {% if messages %}
    {% for message in messages %}
    <div class="flash">{{ message }}</div>
    {% endfor %}
    {% endif %}
    {% endwith %}

    <form method="POST">
        <label for="description">Description:</label><br>
        <textarea id="description" name="description">{{ book.description }}</textarea><br>
        <button type="submit">Save</button>
    </form>

    <a class="back" href="{{ url_for('book_detail', book_id=book.id) }}">Cancel</a>
</body>
</html>

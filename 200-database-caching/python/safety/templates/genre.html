<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ genre | capitalize }} Books - Valkey Caching Workshop</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; color: #333; }
        a { color: #2563eb; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .timing-info { margin: 20px 0; padding: 12px 16px; background: #f3f4f6; border-radius: 6px; display: flex; gap: 24px; }
        .timing-info span { font-weight: 500; }
        .book-list { list-style: none; padding: 0; }
        .book-item { padding: 16px; border-bottom: 1px solid #e5e7eb; }
        .book-item:last-child { border-bottom: none; }
        .book-title { font-weight: 600; font-size: 1.1rem; }
        .book-meta { color: #6b7280; margin-top: 4px; }
        .back-link { display: inline-block; margin-bottom: 16px; }
    </style>
</head>
<body>
    <a href="/" class="back-link">&larr; All genres</a>

    <h1>{{ genre | capitalize }}</h1>

    <div class="timing-info">
        <span>Query time: {{ elapsed_ms }} ms</span>
        <span>Cache: {{ cache_status }}</span>
    </div>

    {% if books %}
    <ul class="book-list">
        {% for book in books %}
        <li class="book-item">
            <div class="book-title"><a href="/book/{{ book.id }}">{{ book.title }}</a></div>
            <div class="book-meta">{{ book.author_name }} &middot; {{ book.published_year }}</div>
        </li>
        {% endfor %}
    </ul>
    {% else %}
    <p>No books found in this genre.</p>
    {% endif %}
</body>
</html>

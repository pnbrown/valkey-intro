<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit {{ book.title }} - Valkey Caching Workshop</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; color: #333; }
        a { color: #2563eb; text-decoration: none; }
        a:hover { text-decoration: underline; }
        label { display: block; margin-bottom: 6px; font-weight: 500; }
        textarea { width: 100%; height: 150px; padding: 8px 12px; font-size: 1rem; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; }
        button { padding: 8px 16px; font-size: 1rem; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 12px; }
        button:hover { background: #1d4ed8; }
        .back-link { display: inline-block; margin-bottom: 16px; }
    </style>
</head>
<body>
    <a href="/book/{{ book.id }}" class="back-link">&larr; Back to {{ book.title }}</a>

    <h1>Edit: {{ book.title }}</h1>

    <form method="post">
        <label for="description">Description:</label>
        <textarea id="description" name="description">{{ book.description }}</textarea>
        <button type="submit">Save changes</button>
    </form>
</body>
</html>

# Docker Compose configuration for running Valkey and PostgreSQL locally.
# Start with: docker compose up -d
# Stop with:  docker compose down

services:
  valkey:
    image: valkey/valkey:latest
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: workshop
      POSTGRES_PASSWORD: workshop
      POSTGRES_DB: bookstore
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workshop -d bookstore"]
      interval: 5s
      timeout: 3s
      retries: 3

volumes:
  pgdata:
